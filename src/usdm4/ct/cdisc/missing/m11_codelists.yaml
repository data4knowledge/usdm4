- codelist: C217045
  source: NCIt-M11
  preferredTerm: ''
  definition: Terminology associated with the trial phase value set codelist of the
    ICH M11 protocol template.
  extensible: false
  terms:
  - conceptId: C54721
    preferredTerm: Early Phase 1
    definition: A clinical trial that uses an investigational agent that is available
      only in very limited quantities and which has never previously given to humans
      or for which there is extremely limited human experience. Phase 0 clinical trials
      are intended to enable researchers to understand the path of the drug in the
      body and its efficacy. Adverse event reporting in Phase 0 trials is expedited.
    submissionValue: ''
    synonyms: []
  - conceptId: C15600
    preferredTerm: Phase 1
    definition: A clinical research protocol designed to test a new biomedical intervention
      in a small group of people for the first time. A Phase I trial can be to establish
      the toxicity of a new treatment with escalating intensity of the treatment administered
      and/or to determine the side effects of a new treatment for a particular indication
      in subjects.
    submissionValue: ''
    synonyms: []
  - conceptId: C15693
    preferredTerm: Phase 1/Phase 2
    definition: A clinical research protocol designed to study the safety, dosage
      levels and response to new treatment. Phase I/II trials combine a Phase I and
      a Phase II trial of the same treatment into a single protocol.
    submissionValue: ''
    synonyms: []
  - conceptId: C198366
    preferredTerm: Phase 1/Phase 2/Phase 3
    definition: A study that begins as a Phase I study and transitions into Phases
      II and III based upon successful completion of each previous portion.
    submissionValue: ''
    synonyms: []
  - conceptId: C198367
    preferredTerm: Phase 1/Phase 3
    definition: A study that begins as a Phase I study and transitions into a Phase
      III study upon successful completion of the Phase I portion.
    submissionValue: ''
    synonyms: []
  - conceptId: C15601
    preferredTerm: Phase 2
    definition: A clinical research protocol designed to study a biomedical or behavioral
      intervention in a larger group of people (several hundred), to evaluate the
      drug's effectiveness for a particular indication in patients with the disease
      or condition under study, and to determine the common short-term side effects
      and risks associated with the intervention.
    submissionValue: ''
    synonyms: []
  - conceptId: C15694
    preferredTerm: Phase 2/Phase 3
    definition: A type of clinical study that combines elements characteristic of
      traditional Phase II and Phase III trials.
    submissionValue: ''
    synonyms: []
  - conceptId: C217024
    preferredTerm: Phase 2/Phase 3/Phase 4
    definition: A study that begins as a Phase II study and transitions into Phases
      III and IV based upon successful completion of each previous portion.
    submissionValue: ''
    synonyms: []
  - conceptId: C15602
    preferredTerm: Phase 3
    definition: A clinical research protocol designed to investigate the efficacy
      of the biomedical or behavioral intervention in large groups of human subjects
      (from several hundred to several thousand), to confirm efficacy, to monitor
      adverse reactions to the new medication or treatment regimen with respect to
      long-term use and by comparing the intervention to other standard or experimental
      interventions as well as to a placebo.
    submissionValue: ''
    synonyms: []
  - conceptId: C217025
    preferredTerm: Phase 3/Phase 4
    definition: A type of clinical study that combines elements characteristic of
      traditional Phase III and Phase IV trials.
    submissionValue: ''
    synonyms: []
  - conceptId: C15603
    preferredTerm: Phase 4
    definition: A randomized, controlled trial that is designed to evaluate the long-term
      safety and efficacy of a drug for a given indication. Often they are designed
      to study side effects that may have become apparent after the phase III study
      was completed.
    submissionValue: ''
    synonyms: []
