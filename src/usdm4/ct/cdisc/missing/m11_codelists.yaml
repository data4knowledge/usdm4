- codelist: C217048
  source: NCIt-M11
  preferredTerm: ''
  definition: Terminology associated with the units of measure value set codelist
    of the ICH M11 protocol template.
  extensible: false
  terms:
  - conceptId: C25529
    preferredTerm: Hours
    definition: A unit measure of time equal to 3,600 seconds or 60 minutes. It is
      approximately 1/24 of a median day.
    submissionValue: ''
    synonyms: []
  - conceptId: C25301
    preferredTerm: Days
    definition: The time for Earth to make a complete rotation on its axis; ordinarily
      divided into twenty-four hours, equal to 86400 seconds. This also refers to
      a specific day.
    submissionValue: ''
    synonyms: []
  - conceptId: C29844
    preferredTerm: Weeks
    definition: Any period of seven consecutive days.
    submissionValue: ''
    synonyms: []
  - conceptId: C29846
    preferredTerm: Months
    definition: One of the 12 divisions of a year as determined by a calendar. It
      corresponds to the unit of time of approximately to one cycle of the moon's
      phases, about 30 days or 4 weeks.
    submissionValue: ''
    synonyms: []
  - conceptId: C29848
    preferredTerm: Years
    definition: A period of time that it takes for Earth to make a complete revolution
      around the sun, approximately 365 days; a specific one year period.
    submissionValue: ''
    synonyms: []
