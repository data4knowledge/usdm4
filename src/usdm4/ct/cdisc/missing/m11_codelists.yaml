- codelist: C217051
  source: NCIt-M11
  preferredTerm: ''
  definition: Terminology associated with the trial blind schema value set codelist
    of the ICH M11 protocol template.
  extensible: false
  terms:
  - conceptId: C15228
    preferredTerm: Double Blind
    definition: A study method in which neither the subjects nor the investigators
      are permitted to know which subject is receiving which treatment.
    submissionValue: ''
    synonyms: []
  - conceptId: C187674
    preferredTerm: Observer Blind
    definition: A study in which the study personnel who measure, record, or assess
      the subject do not know which intervention the subject is receiving or, in the
      context of observational studies, do not know the external factors to which
      a subject has been exposed.
    submissionValue: ''
    synonyms: []
  - conceptId: C49659
    preferredTerm: Open Label
    definition: A type of study that stipulates both the health provider and the subject
      be aware of the drug or treatment assignment.
    submissionValue: ''
    synonyms: []
  - conceptId: C28233
    preferredTerm: Single Blind
    definition: A type of study that stipulates the subject to be unaware of the drug
      or treatment assignment.
    submissionValue: ''
    synonyms: []
