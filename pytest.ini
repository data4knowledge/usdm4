[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts = -v --cov=src --cov-report=term-missing --cov-fail-under=100
filterwarnings =
    ignore::DeprecationWarning:jsonschema
markers =
    slow: marks tests as slow (deselect with '-m "not slow"'). CORE-engine integration tests use this marker.
